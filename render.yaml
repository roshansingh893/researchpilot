services:
  - type: web
    name: researchpilot
    env: docker
    plan: free
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 8000
      - key: EMBEDDING_PROVIDER
        value: openai
      - key: LLM_PROVIDER
        value: groq
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
