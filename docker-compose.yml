services:
  researchpilot:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CHUNK_SIZE=1000
      - CHUNK_OVERLAP=200
      - EMBEDDING_PROVIDER=openai
      # - OPENAI_API_KEY=your_openai_api_key
      # - GROQ_API_KEY=your_groq_api_key
      - LLM_PROVIDER=groq
    volumes:
      - researchpilot_data:/app/data

volumes:
  researchpilot_data:
